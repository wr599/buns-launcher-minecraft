name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows build
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Cache bundle
        id: bundle-cache
        uses: actions/cache@v4
        with:
          path: bundle.tar.xz
          key: bundle-${{ hashFiles('manifest.json') }}

      - name: Build offline bundle
        if: steps.bundle-cache.outputs.cache-hit != 'true'
        run: python build_bundle.py

      - name: Build executable and installer
        run: python build_all.py --skip-bundle --yes

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BunLauncher-Windows
          retention-days: 30
          path: |
            dist/BunLauncher.exe
            installer_output/BunLauncher_Setup.exe
            bundle.tar.xz

  build-linux:
    name: Linux build
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0 libegl1

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Cache bundle
        id: bundle-cache
        uses: actions/cache@v4
        with:
          path: bundle.tar.xz
          key: bundle-${{ hashFiles('manifest.json') }}

      - name: Build offline bundle
        if: steps.bundle-cache.outputs.cache-hit != 'true'
        run: python build_bundle.py

      - name: Build executable
        run: python build_all.py --skip-bundle --skip-installer --yes

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BunLauncher-Linux
          retention-days: 30
          path: |
            dist/BunLauncher
            bundle.tar.xz

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: BunLauncher-Windows
          path: release/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: BunLauncher-Linux
          path: release/linux

      - name: Create release archive
        run: |
          mkdir -p release/out
          cp release/windows/BunLauncher.exe release/out/ 2>/dev/null || true
          cp release/windows/BunLauncher_Setup.exe release/out/ 2>/dev/null || true
          cp release/linux/BunLauncher release/out/ 2>/dev/null || true
          cp release/windows/bundle.tar.xz release/out/bundle.tar.xz 2>/dev/null || cp release/linux/bundle.tar.xz release/out/bundle.tar.xz
          cd release/out
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/out/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
